name: Update KOSPI200 dashboard

on:
  schedule:
    # cron은 UTC 기준. 한국시간(KST=UTC+9) 평일 08:00~20:30, 30분 간격.
    # (GitHub은 촘촘한 크론을 자주 건너뛰므로 30분으로 완화. 그래도 수십분 지연 가능)
    - cron: "0,30 23 * * 0-4"    # KST 08:00, 08:30 (월~금)
    - cron: "0,30 0-11 * * 1-5"  # KST 09:00~20:30 (월~금)
  workflow_dispatch: {}       # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        run: python src/main.py

      - name: Commit dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html state/portfolios.json
          if git diff --cached --quiet; then
            echo "변경 없음 - 커밋 생략"
          else
            git commit -m "chore: 대시보드 자동 갱신 ($(date -u +%Y-%m-%dT%H:%MZ) UTC)"
            git push
          fi
