name: Update KOSPI200 dashboard

# 트리거는 외부 스케줄러(cron-job.org)가 30분마다 workflow_dispatch로 호출한다.
# GitHub 내장 schedule(cron)은 불안정한데다, 뒤늦게 발동하면 cron-job.org 호출과
# 겹쳐 동시 push 충돌로 실패하므로 사용하지 않는다.
on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        run: python src/main.py

      - name: Commit dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html state/portfolios.json
          if git diff --cached --quiet; then
            echo "변경 없음 - 커밋 생략"
          else
            git commit -m "chore: 대시보드 자동 갱신 ($(date -u +%Y-%m-%dT%H:%MZ) UTC)"
            # 동시 실행/원격 선행 커밋 대비: rebase 후 push (최대 3회)
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && break
              echo "push 재시도 $i..."
              sleep 5
            done
          fi
